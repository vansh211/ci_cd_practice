name: My First Workflow
on: push
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install
        working-directory: src

      - name: Run ESLint
        run: npm run lint
        working-directory: src

      - name: Run tests
        run: npm test
        working-directory: src